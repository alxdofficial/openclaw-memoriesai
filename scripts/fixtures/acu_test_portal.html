<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACU Test Portal</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162238;
      --text: #dfe8f7;
      --muted: #8aa0c5;
      --line: #24344f;
      --accent: #4ad2b8;
      --warn: #f7b955;
      --danger: #ff6e6e;
      --mono: "SFMono-Regular", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(74,210,184,0.10), transparent 25%),
        radial-gradient(circle at bottom left, rgba(92,138,255,0.10), transparent 25%),
        var(--bg);
      color: var(--text);
    }

    a { color: var(--accent); }
    .wrap {
      width: min(1320px, calc(100vw - 32px));
      margin: 18px auto 28px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: rgba(17,26,43,0.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.22);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 16px;
    }

    .stack > * + * { margin-top: 16px; }
    h1, h2, h3, pre { margin: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 14px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
      font-size: 14px;
    }

    .meta-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button.danger {
      border-color: rgba(255,110,110,0.35);
      color: #ffd0d0;
    }

    .viewer {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #050a13;
      aspect-ratio: 16 / 9;
    }

    .viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .viewer-note {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(5,10,19,0.75);
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--mono);
    }

    .log-box, .json-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(5,10,19,0.56);
      padding: 12px;
      min-height: 120px;
      max-height: 280px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .event-list, .artifact-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .event-row, .artifact-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(5,10,19,0.42);
    }

    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(5,10,19,0.4);
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card top">
      <div>
        <h1 id="page-title">ACU Test Portal</h1>
        <div class="muted" id="page-subtitle">Loading run…</div>
      </div>
      <div class="toolbar">
        <a class="pill" href="/" id="all-runs-link">All runs</a>
        <button id="refresh-btn">Refresh</button>
        <button id="cleanup-btn" class="danger">Cleanup Run</button>
      </div>
    </section>

    <section class="grid" id="run-view" hidden>
      <div class="stack">
        <section class="card">
          <h2>Live Snapshot</h2>
          <div class="viewer">
            <img id="snapshot" alt="Run snapshot">
            <div class="viewer-note" id="snapshot-note">polling every 500ms</div>
          </div>
        </section>

        <section class="card">
          <h2>Task Summary</h2>
          <div class="json-box" id="task-summary"></div>
        </section>

        <section class="card">
          <h2>Task Messages</h2>
          <div class="json-box" id="task-messages"></div>
        </section>
      </div>

      <div class="stack">
        <section class="card">
          <h2>Run Metadata</h2>
          <div class="meta-grid" id="meta-grid"></div>
          <div class="json-box" id="run-extra" style="margin-top:12px"></div>
        </section>

        <section class="card">
          <h2>Run Events</h2>
          <ul class="event-list" id="event-list"></ul>
        </section>

        <section class="card">
          <h2>Artifacts</h2>
          <ul class="artifact-list" id="artifact-list"></ul>
        </section>

        <section class="card">
          <h2>Filtered Debug Tail</h2>
          <div class="log-box" id="debug-tail"></div>
        </section>
      </div>
    </section>

    <section class="card" id="index-view" hidden>
      <h2>Runs</h2>
      <ul class="artifact-list" id="runs-list"></ul>
    </section>
  </div>

  <script>
    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const runId = pathParts[0] === "runs" ? pathParts[1] : null;
    let snapshotTimer = null;
    let dataTimer = null;
    let currentRun = null;

    function fmtTs(ts) {
      if (!ts) return "";
      return new Date(ts * 1000).toLocaleString();
    }

    async function api(path, options = {}) {
      const r = await fetch(path, options);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    async function loadIndex() {
      document.getElementById("index-view").hidden = false;
      const data = await api("/api/runs");
      const list = document.getElementById("runs-list");
      list.innerHTML = "";
      for (const run of data.runs) {
        const li = document.createElement("li");
        li.className = "artifact-row";
        li.innerHTML = `<a href="/runs/${run.run_id}">${run.name}</a><div class="muted">${run.kind} | ${run.task_id || "no task"} | ${fmtTs(run.created_at)}</div>`;
        list.appendChild(li);
      }
      document.getElementById("page-subtitle").textContent = `${data.runs.length} recorded runs`;
    }

    function renderMeta(run) {
      const grid = document.getElementById("meta-grid");
      const items = {
        "Run ID": run.run_id,
        "Kind": run.kind,
        "Task ID": run.task_id || "—",
        "Display": run.display || "—",
        "Status": run.status || "—",
        "Created": fmtTs(run.created_at),
        "Fixture URL": run.fixture_url || "—",
        "Browser PID": run.browser_pid || "—"
      };
      grid.innerHTML = Object.entries(items).map(([k, v]) =>
        `<div class="meta-item"><span>${k}</span>${String(v)}</div>`
      ).join("");
      const extra = {
        notes: run.notes || "",
        extra: run.extra || {}
      };
      document.getElementById("run-extra").textContent = JSON.stringify(extra, null, 2);
    }

    function renderEvents(events) {
      const list = document.getElementById("event-list");
      list.innerHTML = "";
      for (const ev of events.slice().reverse()) {
        const li = document.createElement("li");
        li.className = "event-row";
        li.innerHTML = `<div><strong>${ev.event}</strong></div><div class="muted">${fmtTs(ev.ts)}</div><div>${escapeHtml(JSON.stringify(ev.payload || {}))}</div>`;
        list.appendChild(li);
      }
    }

    function renderArtifacts(runId, artifacts) {
      const list = document.getElementById("artifact-list");
      list.innerHTML = "";
      if (artifacts.length === 0) {
        list.innerHTML = `<li class="artifact-row muted">No artifacts</li>`;
        return;
      }
      for (const item of artifacts) {
        const li = document.createElement("li");
        li.className = "artifact-row";
        li.innerHTML = `<a href="/api/runs/${runId}/artifacts/${encodeURIComponent(item.name)}" target="_blank">${item.name}</a><div class="muted">${item.size} bytes</div>`;
        list.appendChild(li);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    async function loadRun() {
      const data = await api(`/api/runs/${runId}`);
      currentRun = data.run;
      document.getElementById("run-view").hidden = false;
      document.getElementById("page-title").textContent = data.run.name;
      document.getElementById("page-subtitle").textContent = `${data.run.kind} | ${data.run.task_id || "no task"} | ${fmtTs(data.run.created_at)}`;
      renderMeta(data.run);
      renderEvents(data.events || []);
      renderArtifacts(runId, data.artifacts || []);
      await Promise.all([loadTaskSummary(), loadMessages(), loadDebugTail(), refreshSnapshot()]);
    }

    async function loadTaskSummary() {
      try {
        const data = await api(`/api/runs/${runId}/task_summary?detail=full`);
        document.getElementById("task-summary").textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("task-summary").textContent = String(e);
      }
    }

    async function loadMessages() {
      try {
        const data = await api(`/api/runs/${runId}/messages?limit=100`);
        document.getElementById("task-messages").textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("task-messages").textContent = String(e);
      }
    }

    async function loadDebugTail() {
      try {
        const data = await api(`/api/runs/${runId}/debug_tail?lines=200`);
        document.getElementById("debug-tail").textContent = data.text || "";
      } catch (e) {
        document.getElementById("debug-tail").textContent = String(e);
      }
    }

    async function refreshSnapshot() {
      const img = document.getElementById("snapshot");
      img.src = `/api/runs/${runId}/snapshot?ts=${Date.now()}`;
      document.getElementById("snapshot-note").textContent = `updated ${new Date().toLocaleTimeString()}`;
    }

    async function cleanupRun() {
      if (!runId) return;
      if (!confirm(`Cleanup run ${runId}?`)) return;
      const data = await api(`/api/runs/${runId}/cleanup`, { method: "POST" });
      alert(JSON.stringify(data, null, 2));
      window.location.href = "/";
    }

    document.getElementById("refresh-btn").addEventListener("click", () => {
      if (runId) loadRun();
      else loadIndex();
    });
    document.getElementById("cleanup-btn").addEventListener("click", cleanupRun);

    if (runId) {
      loadRun();
      snapshotTimer = setInterval(refreshSnapshot, 500);
      dataTimer = setInterval(() => {
        loadRun().catch(() => {});
      }, 2000);
    } else {
      document.getElementById("cleanup-btn").hidden = true;
      loadIndex();
      dataTimer = setInterval(() => {
        loadIndex().catch(() => {});
      }, 3000);
    }

    window.addEventListener("beforeunload", () => {
      if (snapshotTimer) clearInterval(snapshotTimer);
      if (dataTimer) clearInterval(dataTimer);
    });
  </script>
</body>
</html>
